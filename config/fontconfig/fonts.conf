<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <match target="pattern">
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Dubai</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>serif</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Dubai</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>system-ui</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Dubai</string></edit>
  </match>

  <match target="pattern">
    <test name="family"><string>Cantarell</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Dubai</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Arial</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Dubai</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Helvetica</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Dubai</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Times New Roman</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Dubai</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Liberation Sans</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Dubai</string></edit>
  </match>
</fontconfig>
